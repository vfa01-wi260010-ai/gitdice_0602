<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitすごろく</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 20px;
            background-color: #f0f4f8;
            color: #333;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }

        #control-panel {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 5px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #dice-button {
            background-color: #f39c12;
            color: white;
        }

        #dice-button:hover:not(:disabled) {
            background-color: #e67e22;
        }

        #dice-button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .route-btn {
            background-color: #3498db;
            color: white;
        }

        .route-btn:hover {
            background-color: #2980b9;
        }

        #result-area {
            margin-top: 15px;
            background: #e8f8f5;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #1abc9c;
        }

        textarea {
            width: 100%;
            max-width: 800px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
        }

        #board-wrapper {
            position: relative;
            width: 1200px;
            height: 800px;
            background-image: url('kanagawa-map.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #b8860b;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .cell {
            position: absolute;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 11px;
            z-index: 5;
            transform: translate(-50%, -50%);
        }

        .dead-end {
            background-color: rgba(231, 76, 60, 0.8);
            border: 2px solid #c0392b;
        }

        .piece {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 32px;
            transition: top 0.4s ease, left 0.4s ease, transform 0.3s;
            z-index: 10;
            margin-top: -20px;
            margin-left: -20px;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.5));
        }

        .my-piece {
            z-index: 100 !important;
            transform: scale(1.4);
            filter: drop-shadow(0 0 10px #f1c40f) drop-shadow(0 0 20px #f39c12) !important;
        }

        #player-selection {
            margin-bottom: 15px;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
        }

        select {
            font-size: 16px;
            padding: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        #confirm-player-btn {
            background-color: #2ecc71;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            margin-left: 10px;
        }

        #confirm-player-btn:hover {
            background-color: #27ae60;
        }

        #current-player-display {
            display: none;
            font-size: 20px;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 15px;
        }

        #reset-player-btn {
            font-size: 12px;
            padding: 4px 8px;
            margin-left: 10px;
            background-color: #95a5a6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #reset-player-btn:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>

<body>
    <header>
        <h1>Gitすごろく</h1>
    </header>

    <div id="control-panel">
        <div id="player-selection">
            <label for="player-select">👤 自分のプレイヤーを選んで決定してください：</label>
            <select id="player-select">
                <option value="playerA">😎 A</option>
                <option value="playerB">🤠 B</option>
                <option value="playerC">👽 C</option>
                <option value="playerD">🤖 D</option>
                <option value="playerE">👻 E</option>
            </select>
            <button id="confirm-player-btn" class="btn">決定</button>
        </div>

        <div id="current-player-display">
            <span id="current-player-name"></span>
            <button id="reset-player-btn">(変更する)</button>
        </div>

        <div id="dice-container">
            <span id="dice"
                style="font-size: 40px; display: inline-block; margin-right: 15px; vertical-align: middle;">🎲</span>
            <button id="dice-button" class="btn" disabled>サイコロを振る</button>
        </div>

        <div id="direction-buttons"
            style="display: none; margin-top: 15px; padding: 15px; background: #fff3e0; border-radius: 8px; border: 2px dashed #f39c12;">
        </div>

        <div id="result-area" style="display: none;">
            <p id="event-result-text" style="font-size: 18px; font-weight: bold; color: #16a085;"></p>
            <p style="margin: 10px 0 5px; color: #555;">↓ 以下のコードを <code>history.js</code> に追記してコミット＆プッシュしてください ↓</p>
            <textarea id="copy-code-area" rows="2" readonly></textarea>
        </div>
    </div>

    <div id="board-wrapper">
        <div id="pieces-container"></div>
        <div class="cell" id="cell-1" data-x="81" data-y="30" title="横浜"></div>
        <div class="cell" id="cell-2" data-x="85" data-y="16" title="川崎"></div>
        <div class="cell" id="cell-3" data-x="69" data-y="10" title="新百合丘"></div>
        <div class="cell" id="cell-4" data-x="52" data-y="10" title="町田"></div>
        <div class="cell" id="cell-5" data-x="50" data-y="23" title="大和"></div>
        <div class="cell" id="cell-6" data-x="39" data-y="26" title="厚木"></div>
        <div class="cell" id="cell-7" data-x="25" data-y="33" title="秦野"></div>
        <div class="cell" id="cell-8" data-x="27" data-y="51" title="小田原"></div>
        <div class="cell" id="cell-9" data-x="48" data-y="50" title="茅ヶ崎"></div>
        <div class="cell" id="cell-10" data-x="65" data-y="48" title="藤沢"></div>
        <div class="cell" id="cell-11" data-x="78" data-y="44" title="鎌倉"></div>
        <div class="cell dead-end" id="cell-103" data-x="72" data-y="62" title="三崎口"></div>
        <div class="cell dead-end" id="cell-104" data-x="9" data-y="47" title="箱根湯本"></div>
        <div class="cell dead-end" id="cell-105" data-x="30" data-y="16" title="相模湖"></div>
    </div>

    <script src="history.js"></script>

    <script>
        const historyData = (typeof gameHistory !== 'undefined' && Array.isArray(gameHistory)) ? gameHistory : [];

        const STATION_NAMES = {
            1: "横浜", 2: "川崎", 3: "新百合丘", 4: "町田", 5: "大和",
            6: "厚木", 7: "秦野", 8: "小田原", 9: "茅ヶ崎", 10: "藤沢",
            11: "鎌倉", 103: "三崎口", 104: "箱根湯本", 105: "相模湖"
        };

        function getCellIdByName(name) {
            return parseInt(Object.keys(STATION_NAMES).find(key => STATION_NAMES[key] === name));
        }

        const ROUTES = {
            1: [2, 11], 2: [1, 3], 3: [2, 4], 4: [3, 5], 5: [4, 6],
            6: [5, 7, 105], 7: [6, 8], 8: [7, 9, 104], 9: [8, 10],
            10: [9, 11, 103], 11: [10, 1],
            103: [10], 104: [8], 105: [6]
        };

        function renderGridPositions() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.style.left = `${parseFloat(cell.dataset.x)}%`;
                cell.style.top = `${(parseFloat(cell.dataset.y) / 70) * 100}%`;
            });
        }

        const TEAM_MEMBERS = [
            { id: "playerA", name: "A", icon: "😎" },
            { id: "playerB", name: "B", icon: "🤠" },
            { id: "playerC", name: "C", icon: "👽" },
            { id: "playerD", name: "D", icon: "🤖" },
            { id: "playerE", name: "E", icon: "👻" }
        ];

        function getPlayerPositions() {
            const positions = {};
            TEAM_MEMBERS.forEach(p => positions[p.id] = 1);

            historyData.forEach(record => {
                if (record.player && record.finalPos) {
                    const cellId = getCellIdByName(record.finalPos);
                    if (cellId) positions[record.player] = cellId;
                }
            });
            return positions;
        }


        const TREASURE_SCHEDULE = [
            { cell: 5, hint3: "村人：「南西へ向かい、町と町を繋ぐ大きな交差点となる場所だべ」", hint8: "古文書：「東の海を目指す手前、北へと進路を変える分岐点にそれはある」" },
            { cell: 104, hint3: "村人：「南西の深い谷底、大地から熱い息吹が噴き出している場所だべ」", hint8: "古文書：「我が足元からさらに西、険しき山の入り口となる行き止まりだ」" },
            { cell: 2, hint3: "村人：「東の果て、大きな川を越えればもう別の国(東京)だそうだべ」", hint8: "古文書：「太陽が昇る方角へ進み続けよ。この地から最も遠き東の端である」" },
            { cell: 9, hint3: "村人：「南の海に浮かぶ、烏帽子のような奇岩が見える街だべ」", hint8: "古文書：「海に沿って東へ向かえ。波音と音楽が混ざり合う陽気な地だ」" },
            { cell: 105, hint3: "村人：「ずっと西の山奥、巨大な水鏡に怪しい影が潜んでいるらしいべ」", hint8: "古文書：「海を探しても無駄だ。ひたすらに北西の山奥、行き止まりの冷たい水辺を目指せ」" },
            { cell: 7, hint3: "村人：「南西の大きな川を越えた先、ぐるりと山に囲まれた盆地だべ」", hint8: "古文書：「東へ一歩踏み出せ。名水を湛える自然豊かな地がそこにある」" },
            { cell: 11, hint3: "村人：「南東の果て、古き武士たちが築いた都が眠っているらしいべ」", hint8: "古文書：「東の海沿いをさらに進み、北へと入り込んだ歴史深き谷底を目指せ」" },
            { cell: 4, hint3: "村人：「すぐ南西にある、まるで都のように栄えた境界の街だべ」", hint8: "古文書：「北東の空の下、神奈川であって神奈川でないような不思議な地を探せ」" },
            { cell: 103, hint3: "村人：「南東に突き出た半島の、一番先っぽの海の中だべ」", hint8: "古文書：「海沿いを東へ進み、そこからさらに南の果て。道が途切れる場所だ」" },
            { cell: 6, hint3: "村人：「南西へ進み、大きな川を渡ったすぐの場所が怪しいべ」", hint8: "古文書：「東へ進み、川を越える手前。北と南の分かれ道となる場所を探せ」" },
            { cell: 10, hint3: "村人：「南の海へ向かうための、陸の玄関口に隠されているらしいべ」", hint8: "古文書：「東の海沿いに向かい、さらに歴史ある都の手前で立ち止まれ」" },
            { cell: 8, hint3: "村人：「ずっと南西の、立派な城がそびえ立つ街に宝があるらしいべ」", hint8: "古文書：「遠くを探す必要はない。汝の足元、この城下町を掘り返してみよ」" },
            { cell: 3, hint3: "村人：「遠くばかり見てないで、自分の足元をよく探してみるだべ」", hint8: "古文書：「はるか北東、新しい百合の花が咲く丘を目指すのだ」" }
        ];

        let foundTreasureCount = 0;
        historyData.forEach(record => {
            if (record.foundTreasure) {
                foundTreasureCount++;
            }
        });

        const currentRoundIndex = Math.min(foundTreasureCount, TREASURE_SCHEDULE.length - 1);
        const currentTreasureData = TREASURE_SCHEDULE[currentRoundIndex];

        const TREASURE_CELL = currentTreasureData.cell;
        const HINT_CELLS = {
            3: currentTreasureData.hint3,
            8: currentTreasureData.hint8
        };

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        let currentPlayerId = null;
        try {
            const urlParams = new URLSearchParams(window.location.search);
            currentPlayerId = urlParams.get('player');
            if (!currentPlayerId) {
                currentPlayerId = localStorage.getItem('git_sugoroku_player_id');
            }
        } catch (e) { }

        let remainingSteps = 0;
        let myCurrentPos = 1;
        let myPreviousPos = null;

        function initBoard() {
            renderGridPositions();
            const currentPositions = getPlayerPositions();

            TEAM_MEMBERS.forEach(player => {
                const pieceEl = document.createElement('div');
                pieceEl.id = `piece-${player.id}`;
                pieceEl.className = 'piece';
                pieceEl.innerText = player.icon;
                document.getElementById('pieces-container').appendChild(pieceEl);

                updatePiecePosition(player.id, currentPositions[player.id]);
            });

            if (currentPlayerId) {
                const playerObj = TEAM_MEMBERS.find(p => p.id === currentPlayerId);
                if (playerObj) {
                    showPlayerFixedUI(playerObj.name);
                    highlightMyPiece(currentPlayerId);
                    myCurrentPos = currentPositions[currentPlayerId];

                    try {
                        if (!window.location.search.includes('player=')) {
                            const newUrl = new URL(window.location);
                            newUrl.searchParams.set('player', currentPlayerId);
                            window.history.replaceState(null, '', newUrl);
                        }
                    } catch (e) { }
                }
            }
        }

        function updatePiecePosition(playerId, cellId) {
            const pieceEl = document.getElementById(`piece-${playerId}`);
            const targetCell = document.getElementById(`cell-${cellId}`);
            if (pieceEl && targetCell) {
                pieceEl.style.left = targetCell.style.left;
                pieceEl.style.top = targetCell.style.top;
            }
        }

        function showPlayerFixedUI(playerName) {
            document.getElementById('current-player-name').innerHTML = `あなたは <strong>${playerName}</strong> です！`;
            document.getElementById('current-player-display').style.display = 'block';
            document.getElementById('player-selection').style.display = 'none';
            document.getElementById('dice-button').disabled = false;
        }

        function highlightMyPiece(playerId) {
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('my-piece'));
            const myPiece = document.getElementById(`piece-${playerId}`);
            if (myPiece) myPiece.classList.add('my-piece');
        }

        document.getElementById('confirm-player-btn').addEventListener('click', () => {
            const selectEl = document.getElementById('player-select');
            currentPlayerId = selectEl.value;

            try { localStorage.setItem('git_sugoroku_player_id', currentPlayerId); } catch (e) { }
            try {
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('player', currentPlayerId);
                window.history.replaceState(null, '', newUrl);
            } catch (e) { }

            const selectedText = selectEl.options[selectEl.selectedIndex].text;
            showPlayerFixedUI(selectedText);
            highlightMyPiece(currentPlayerId);

            const positions = getPlayerPositions();
            myCurrentPos = positions[currentPlayerId];
        });

        document.getElementById('reset-player-btn').addEventListener('click', () => {
            if (confirm('プレイヤーの選択をやり直しますか？')) {
                try { localStorage.removeItem('git_sugoroku_player_id'); } catch (e) { }
                window.location.href = window.location.pathname;
            }
        });

        document.getElementById('dice-button').addEventListener('click', async () => {
            const diceBtn = document.getElementById('dice-button');
            const diceDisplay = document.getElementById('dice');
            diceBtn.disabled = true;

            diceDisplay.style.transform = "scale(1.3) rotate(360deg)";
            diceDisplay.style.transition = "transform 0.4s";
            await sleep(400);

            remainingSteps = Math.floor(Math.random() * 6) + 1;
            diceDisplay.innerText = `🎲 ${remainingSteps}`;
            diceDisplay.style.transform = "scale(1) rotate(0deg)";

            myPreviousPos = null;
            processMovement();
        });

        async function processMovement() {
            while (remainingSteps > 0) {
                let validNodes = ROUTES[myCurrentPos].filter(node => node !== myPreviousPos);

                if (validNodes.length === 0) {
                    validNodes = [myPreviousPos];
                }

                if (validNodes.length === 1) {
                    const nextNode = validNodes[0];
                    await animateMove(nextNode);
                    remainingSteps--;
                } else {
                    showDirectionButtons(validNodes);
                    return;
                }
            }
            finishTurn();
        }

        async function animateMove(nextNode) {
            myPreviousPos = myCurrentPos;
            myCurrentPos = nextNode;
            updatePiecePosition(currentPlayerId, myCurrentPos);
            await sleep(400);
        }

        function showDirectionButtons(validNodes) {
            const container = document.getElementById('direction-buttons');
            container.innerHTML = '<p style="font-weight:bold; font-size: 18px; margin-top: 0;">分岐点です！どちらに進みますか？</p>';

            validNodes.forEach(node => {
                const btn = document.createElement('button');
                btn.className = 'btn route-btn';
                btn.innerText = `${STATION_NAMES[node]} 方面へ`;
                btn.onclick = async () => {
                    container.style.display = 'none';
                    await animateMove(node);
                    remainingSteps--;

                    if (node >= 100) {
                        remainingSteps = 0;
                    }
                    processMovement();
                };
                container.appendChild(btn);
            });
            container.style.display = 'block';
        }

        function finishTurn() {
            let eventText = "無事に移動した！";
            let isTreasureFound = false;

            if (foundTreasureCount >= TREASURE_SCHEDULE.length) {
                eventText = `👏 全13個の伝説のお宝をコンプリート！完全クリア！ 👏`;
            } else if (myCurrentPos === TREASURE_CELL) {
                eventText = `🎉 第${foundTreasureCount + 1}の伝説のお宝をついに発見！！ 🎉`;
                isTreasureFound = true;
            } else if (HINT_CELLS[myCurrentPos]) {
                eventText = `💡 ヒント発見！ ${HINT_CELLS[myCurrentPos]}`;
            }

            const resultTextEl = document.getElementById('event-result-text');
            resultTextEl.innerText = eventText;
            resultTextEl.style.color = isTreasureFound ? "#e74c3c" : "#16a085";
            resultTextEl.style.fontSize = isTreasureFound ? "22px" : "18px";

            const nextTurnNum = historyData.length + 1;
            const stationName = STATION_NAMES[myCurrentPos];

            const copyCode = `{ turn: ${nextTurnNum}, player: "${currentPlayerId}", finalPos: "${stationName}", event: "${eventText}", foundTreasure: ${isTreasureFound} },`;

            document.getElementById('copy-code-area').value = copyCode;
            document.getElementById('result-area').style.display = 'block';

            document.getElementById('dice-button').disabled = false;
        }

        window.addEventListener('DOMContentLoaded', initBoard);
    </script>
</body>

</html>
